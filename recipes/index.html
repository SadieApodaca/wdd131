<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Book</title>
    <link href="index.css" rel="stylesheet">
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Your Title">
    <meta property="og:description" content="Your Description">
    <meta property="og:url" content="Your URL">
    <meta property="og:image" content="social-preview-image.png">
    <!-- X Card -->
    <meta name="twitter:card" content="Social Preview Image">
    <meta name="twitter:title" content="Your Title">
    <meta name="twitter:description" content="Your Description">
    <meta name="twitter:image" content="social-preview-image.png">
    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="/favicon.ico">
    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">   
</head>
<body>
    <header>
        <h1><img id="logo" src="recipe-book.png">RECIPEBOOK</h1>
        <form id="bar">
            <input type="text" placeholder="Find a recipe" name="search">
            <button type="submit"><img id="search" src="search.svg"></button>
        </form>
    </header>
    <hr>
    <div id="flex">
        <img id="apple" src="apple-crisp.jpg">
        <div>
            <button class="tag">dessert</button>
            <h2>APPLE CRISP</h2>
            <span class="rating" role="img" aria-label="Rating: 4 out of 5 stars">
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star-empty">☆</span>
            </span>
            <p hidden>This apple crisp recipe is a simple yet delicious fall dessert that's great served warm with vanilla ice cream</p>
            
        </div>
    </div>
</body>
<footer>
    <div class="social">
        <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
        <a href="#"><img src="instagram_icon.svg" alt="instagram icon"></a>
        <a href="#"><img src="youtube_icon.svg" alt="youtube icon"></a>
        <a href="#"><img src="pinterest_icon.svg" alt="pinterest icon"></a>
    </div> 
    <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>
                                      
</footer>
</html>
